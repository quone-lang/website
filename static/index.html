<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quone - a typed functional language for R</title>
    <meta
      name="description"
      content="Quone is a statically typed functional language with Hindley-Milner inference and native dataframe verbs that compiles to readable R."
    />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" id="theme-color-meta" content="#fafaf9" />
    <link rel="canonical" id="canonical-url" href="https://quone-lang.org/" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Quone" />
    <meta property="og:title" content="Quone - a typed functional language for R" />
    <meta
      property="og:description"
      content="Hindley-Milner inference, custom types, native dataframe verbs - compiled to readable R."
    />
    <meta property="og:url" content="https://quone-lang.org" />
    <meta property="og:image" content="https://quone-lang.org/social-card-share.png" />
    <meta property="og:image:secure_url" content="https://quone-lang.org/social-card-share.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Quone - a typed functional language for R" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Quone - a typed functional language for R" />
    <meta
      name="twitter:description"
      content="Hindley-Milner inference, custom types, native dataframe verbs - compiled to readable R."
    />
    <meta name="twitter:image" content="https://quone-lang.org/social-card-share.png" />
    <meta name="twitter:image:alt" content="Quone - a typed functional language for R" />

    <!-- Fonts.

         All four fonts are self-hosted under /fonts/ and fingerprinted by
         build.sh, so they share the long-cache `immutable` policy in
         netlify.toml and avoid the cross-origin DNS+TLS hops we used to
         pay for fonts.googleapis.com.

         The three text fonts (Inter, Space Grotesk, JetBrains Mono) are
         declared with `font-display: optional` so the browser uses the
         metric-matched fallback if the woff2 hasn't arrived within ~100ms;
         on the next visit it loads from cache instantly. Combined with the
         <link rel="preload"> below this means no FOUT on first paint and no
         flash-and-swap on subsequent paints.

         The logo font (Bitcount Grid Double) is decorative and only used
         for the small Q glyph, so it stays on `swap` -- worth waiting for
         even if it arrives late, since there is no good fallback for a
         dot-matrix display face.

         The `local()` entries on each fallback declaration just point at
         a system font; the override descriptors reshape that fallback so
         its line-box matches the web font, eliminating reflow on swap. -->
    <link
      rel="preload"
      href="/fonts/__FONT_INTER__"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/__FONT_SPACEGROTESK__"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/__FONT_JETBRAINSMONO__"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <style>
      @font-face {
        font-family: "Inter";
        font-style: normal;
        font-weight: 400 700;
        font-display: optional;
        src: url("/fonts/__FONT_INTER__") format("woff2");
      }
      @font-face {
        font-family: "Inter Fallback";
        size-adjust: 107.4%;
        ascent-override: 90%;
        descent-override: 22.43%;
        line-gap-override: 0%;
        src: local("Arial");
      }

      @font-face {
        font-family: "Space Grotesk";
        font-style: normal;
        font-weight: 500 700;
        font-display: optional;
        src: url("/fonts/__FONT_SPACEGROTESK__") format("woff2");
      }
      @font-face {
        font-family: "Space Grotesk Fallback";
        size-adjust: 105.5%;
        ascent-override: 92.91%;
        descent-override: 19.18%;
        line-gap-override: 9.59%;
        src: local("Arial");
      }

      @font-face {
        font-family: "JetBrains Mono";
        font-style: normal;
        font-weight: 400 600;
        font-display: optional;
        src: url("/fonts/__FONT_JETBRAINSMONO__") format("woff2");
      }
      @font-face {
        font-family: "JetBrains Mono Fallback";
        size-adjust: 92%;
        ascent-override: 99%;
        descent-override: 24%;
        line-gap-override: 0%;
        src: local("Menlo"), local("Consolas"), local("Courier New");
      }

      @font-face {
        font-family: "Bitcount Grid Double";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url("/fonts/__FONT_BITCOUNTGRIDDOUBLE__") format("woff");
      }

      /* Globally extend Elm's typeface stacks with the matched fallbacks
         so that on the rare first-paint where `font-display: optional`
         falls back to system fonts, the line-boxes still match the web
         font's metrics and nothing reflows once it loads. */
      body,
      input,
      button,
      textarea,
      select {
        font-family:
          "Inter", "Inter Fallback", system-ui, -apple-system,
          "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }

      :root {
        color-scheme: light;
        --page-bg: #fafaf9;
        --page-radial-primary: rgba(39, 109, 195, 0.06);
        --page-radial-secondary: rgba(224, 96, 76, 0.04);
        --hero-swap-accent: #276dc3;
        --repl-shadow:
          0 1px 1px rgba(27, 34, 44, 0.04),
          0 6px 18px rgba(27, 34, 44, 0.08),
          0 18px 36px rgba(27, 34, 44, 0.04);
        --tok-pkg: #0d9488;
        --tok-op: #b03a28;
        --tok-fn: #6d28d9;
        --tok-paren: #4a4a4a;
        --tok-str: #a16207;
        --tab-text: #8a8a8a;
        --tab-hover-text: #1a1a1a;
        --tab-hover-bg: rgba(39, 109, 195, 0.04);
        --tab-active-text: #1a1a1a;
        --tab-active-border: #276dc3;
        --tab-focus: #276dc3;
        --copy-button-bg: rgba(39, 109, 195, 0.06);
        --copy-button-hover-bg: rgba(39, 109, 195, 0.12);
        --copy-button-border: rgba(39, 109, 195, 0.18);
        --copy-button-text: #1a4f8b;
        --copy-button-copied-bg: #276dc3;
        --copy-button-copied-text: #ffffff;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --page-bg: #0b1015;
          --page-radial-primary: rgba(55, 126, 214, 0.18);
          --page-radial-secondary: rgba(240, 123, 103, 0.12);
          --hero-swap-accent: #98c6ff;
          --repl-shadow:
            0 1px 1px rgba(0, 0, 0, 0.28),
            0 10px 24px rgba(0, 0, 0, 0.34),
            0 24px 48px rgba(0, 0, 0, 0.24);
          --tok-pkg: #54d1c8;
          --tok-op: #ff907a;
          --tok-fn: #bc9cff;
          --tok-paren: #c8d0da;
          --tok-str: #e8b763;
          --tab-text: #8d97a7;
          --tab-hover-text: #f2f5f8;
          --tab-hover-bg: rgba(55, 126, 214, 0.14);
          --tab-active-text: #f2f5f8;
          --tab-active-border: #98c6ff;
          --tab-focus: #98c6ff;
          --copy-button-bg: rgba(55, 126, 214, 0.14);
          --copy-button-hover-bg: rgba(55, 126, 214, 0.22);
          --copy-button-border: rgba(152, 198, 255, 0.24);
          --copy-button-text: #98c6ff;
          --copy-button-copied-bg: #377ed6;
          --copy-button-copied-text: #ffffff;
        }
      }

      :root[data-theme="light"] {
        color-scheme: light;
        --page-bg: #fafaf9;
        --page-radial-primary: rgba(39, 109, 195, 0.06);
        --page-radial-secondary: rgba(224, 96, 76, 0.04);
        --hero-swap-accent: #276dc3;
        --repl-shadow:
          0 1px 1px rgba(27, 34, 44, 0.04),
          0 6px 18px rgba(27, 34, 44, 0.08),
          0 18px 36px rgba(27, 34, 44, 0.04);
        --tok-pkg: #0d9488;
        --tok-op: #b03a28;
        --tok-fn: #6d28d9;
        --tok-paren: #4a4a4a;
        --tok-str: #a16207;
        --tab-text: #8a8a8a;
        --tab-hover-text: #1a1a1a;
        --tab-hover-bg: rgba(39, 109, 195, 0.04);
        --tab-active-text: #1a1a1a;
        --tab-active-border: #276dc3;
        --tab-focus: #276dc3;
        --copy-button-bg: rgba(39, 109, 195, 0.06);
        --copy-button-hover-bg: rgba(39, 109, 195, 0.12);
        --copy-button-border: rgba(39, 109, 195, 0.18);
        --copy-button-text: #1a4f8b;
        --copy-button-copied-bg: #276dc3;
        --copy-button-copied-text: #ffffff;
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --page-bg: #0b1015;
        --page-radial-primary: rgba(55, 126, 214, 0.18);
        --page-radial-secondary: rgba(240, 123, 103, 0.12);
        --hero-swap-accent: #98c6ff;
        --repl-shadow:
          0 1px 1px rgba(0, 0, 0, 0.28),
          0 10px 24px rgba(0, 0, 0, 0.34),
          0 24px 48px rgba(0, 0, 0, 0.24);
        --tok-pkg: #54d1c8;
        --tok-op: #ff907a;
        --tok-fn: #bc9cff;
        --tok-paren: #c8d0da;
        --tok-str: #e8b763;
        --tab-text: #8d97a7;
        --tab-hover-text: #f2f5f8;
        --tab-hover-bg: rgba(55, 126, 214, 0.14);
        --tab-active-text: #f2f5f8;
        --tab-active-border: #98c6ff;
        --tab-focus: #98c6ff;
        --copy-button-bg: rgba(55, 126, 214, 0.14);
        --copy-button-hover-bg: rgba(55, 126, 214, 0.22);
        --copy-button-border: rgba(152, 198, 255, 0.24);
        --copy-button-text: #98c6ff;
        --copy-button-copied-bg: #377ed6;
        --copy-button-copied-text: #ffffff;
      }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--page-bg);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-image:
          radial-gradient(1000px circle at 10% -10%, var(--page-radial-primary), transparent 40%),
          radial-gradient(900px circle at 110% 10%, var(--page-radial-secondary), transparent 45%);
        background-attachment: fixed;
      }
      #root, .elm-app {
        min-height: 100%;
      }

      /* Hero headline trailing-letter swap: the "R" crossfades into a
         Quone-blue Bitcount-Grid "Q" when the hero heading is hovered. */
      .hero-swap {
        position: relative;
        display: inline-block;
        white-space: nowrap;
      }
      .hero-swap-default,
      .hero-swap-alt {
        display: inline-block;
        transition: opacity 220ms ease, transform 220ms ease;
      }
      .hero-swap-alt {
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(calc(-50% + 0.12em));
        opacity: 0;
        color: var(--hero-swap-accent);
        pointer-events: none;
        font-family: "Bitcount Grid Double", "JetBrains Mono", "JetBrains Mono Fallback", monospace;
        font-weight: 400;
        font-size: 1.2em;
        line-height: 1;
      }
      .hero-swap:hover .hero-swap-default,
      h1:hover .hero-swap-default {
        opacity: 0;
        transform: translateY(-0.12em);
      }
      .hero-swap:hover .hero-swap-alt,
      h1:hover .hero-swap-alt {
        opacity: 1;
        transform: translateY(-50%);
      }
      @media (prefers-reduced-motion: reduce) {
        .hero-swap-default,
        .hero-swap-alt {
          transition: none;
          transform: none;
        }
      }

      /* Hero R REPL - decorative R console with a Run button. */
      .repl-window {
        box-shadow: var(--repl-shadow);
      }
      .repl-command .tok-pkg { color: var(--tok-pkg); font-weight: 600; }
      .repl-command .tok-op  { color: var(--tok-op); }
      .repl-command .tok-fn  { color: var(--tok-fn); font-weight: 500; }
      .repl-command .tok-paren { color: var(--tok-paren); }
      .repl-command .tok-str { color: var(--tok-str); }

      .repl-run {
        transition: background-color 140ms ease, transform 80ms ease;
      }
      .repl-run:active {
        transform: scale(0.96);
      }
      .repl-run-label {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        line-height: 1;
      }
      .repl-play {
        display: inline-block;
        font-size: 0.78em;
        line-height: 1;
        transform: translateY(0.5px);
      }

      /* Animated trailing dots on the "compiling Quone" line. */
      @keyframes repl-dot-blink {
        0%, 20%   { opacity: 0; }
        50%, 100% { opacity: 1; }
      }
      .repl-dot {
        animation: repl-dot-blink 1.2s infinite;
      }
      .repl-dot-1 { animation-delay: 0s;   }
      .repl-dot-2 { animation-delay: 0.2s; }
      .repl-dot-3 { animation-delay: 0.4s; }

      /* Compiling line + R output enter with a small slide-in. */
      @keyframes repl-rise {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .repl-compiling,
      .repl-output {
        animation: repl-rise 240ms ease-out both;
      }

      @media (prefers-reduced-motion: reduce) {
        .repl-dot { animation: none; opacity: 1; }
        .repl-compiling,
        .repl-output {
          animation: none;
        }
      }

      /* Snippet tab strip above the hero Quone source. Looks like a
         row of editor file tabs; horizontally scrolls on mobile. */
      .snippet-tabs {
        display: flex;
        gap: 4px;
        overflow-x: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
        padding: 0 2px;
      }
      .snippet-tabs::-webkit-scrollbar {
        display: none;
      }
      .snippet-tab {
        flex: 0 0 auto;
        appearance: none;
        background: transparent;
        border: 0;
        border-bottom: 2px solid transparent;
        padding: 8px 14px;
        font-family: "JetBrains Mono", "JetBrains Mono Fallback",
          ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        color: var(--tab-text);
        cursor: pointer;
        transition: color 140ms ease, border-color 140ms ease,
          background-color 140ms ease;
        white-space: nowrap;
        line-height: 1.2;
      }
      .snippet-tab:hover {
        color: var(--tab-hover-text);
        background-color: var(--tab-hover-bg);
      }
      .snippet-tab-active {
        color: var(--tab-active-text);
        border-bottom-color: var(--tab-active-border);
        font-weight: 500;
      }
      .snippet-tab:focus-visible {
        outline: 2px solid var(--tab-focus);
        outline-offset: -2px;
        border-radius: 2px;
      }

      .code-block-pre {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .code-copy-button {
        appearance: none;
        border: 1px solid var(--copy-button-border);
        background: var(--copy-button-bg);
        color: var(--copy-button-text);
        border-radius: 999px;
        padding: 5px 10px;
        font: inherit;
        font-size: 12px;
        font-weight: 500;
        line-height: 1;
        cursor: pointer;
        transition:
          background-color 140ms ease,
          border-color 140ms ease,
          color 140ms ease,
          transform 80ms ease;
      }
      .code-copy-button:hover {
        background: var(--copy-button-hover-bg);
      }
      .code-copy-button:active {
        transform: scale(0.97);
      }
      .code-copy-button:focus-visible {
        outline: 2px solid var(--tab-focus);
        outline-offset: 2px;
      }
      .code-copy-button[data-copy-state="copied"] {
        background: var(--copy-button-copied-bg);
        border-color: var(--copy-button-copied-bg);
        color: var(--copy-button-copied-text);
      }

      @media (max-width: 640px) {
        .snippet-tabs {
          gap: 2px;
          padding: 0 1px;
        }
        .snippet-tab {
          padding: 6px 10px;
          font-size: 12px;
        }
        .repl-run-label {
          gap: 6px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var canonical = document.getElementById("canonical-url");
        if (!canonical) return;

        var canonicalUrl = new URL(window.location.pathname || "/", "https://quone-lang.org");
        canonical.href = canonicalUrl.toString();
      })();
    </script>
    <script src="/__ELM_BUNDLE__"></script>
    <script>
      (function () {
        var darkMedia = window.matchMedia("(prefers-color-scheme: dark)");
        var root = document.documentElement;
        var themeColorMeta = document.getElementById("theme-color-meta");
        var themePreference = "system";

        function resolvedTheme(preference) {
          if (preference === "dark" || preference === "light") {
            return preference;
          }

          return darkMedia.matches ? "dark" : "light";
        }

        function applyThemePreference(preference) {
          themePreference = preference;

          if (preference === "dark" || preference === "light") {
            root.setAttribute("data-theme", preference);
          } else {
            root.removeAttribute("data-theme");
          }

          if (themeColorMeta) {
            themeColorMeta.content =
              resolvedTheme(preference) === "dark" ? "#0b1015" : "#fafaf9";
          }
        }

        var app = Elm.Main.init({
          node: document.getElementById("root"),
          flags: {
            width: window.innerWidth,
            height: window.innerHeight,
            prefersDark: darkMedia.matches,
          },
        });

        var notifyThemeChange = function(event) {
          applyThemePreference(themePreference);

          if (app.ports && app.ports.systemThemeChanged) {
            app.ports.systemThemeChanged.send(event.matches);
          }
        };

        if (app.ports && app.ports.setThemePreference) {
          app.ports.setThemePreference.subscribe(applyThemePreference);
        }

        if (darkMedia.addEventListener) {
          darkMedia.addEventListener("change", notifyThemeChange);
        } else if (darkMedia.addListener) {
          darkMedia.addListener(notifyThemeChange);
        }

        applyThemePreference(themePreference);
      })();
    </script>
    <script>
      (function () {
        var resetTimers = new WeakMap();

        function setButtonLabel(button, label, state) {
          button.textContent = label;

          if (state) {
            button.setAttribute("data-copy-state", state);
          } else {
            button.removeAttribute("data-copy-state");
          }
        }

        function resetCopiedState(button) {
          var existing = resetTimers.get(button);
          if (existing) {
            window.clearTimeout(existing);
          }

          var timer = window.setTimeout(function () {
            setButtonLabel(button, "Copy", null);
            resetTimers.delete(button);
          }, 1800);

          resetTimers.set(button, timer);
        }

        function fallbackCopy(text) {
          var textarea = document.createElement("textarea");
          textarea.value = text;
          textarea.setAttribute("readonly", "");
          textarea.style.position = "fixed";
          textarea.style.top = "-9999px";
          textarea.style.opacity = "0";
          document.body.appendChild(textarea);
          textarea.select();

          try {
            return document.execCommand("copy");
          } finally {
            document.body.removeChild(textarea);
          }
        }

        async function copyText(text) {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
            return true;
          }

          return fallbackCopy(text);
        }

        document.addEventListener("click", function (event) {
          var button = event.target.closest(".code-copy-button[data-copy-text]");
          if (!button) return;

          event.preventDefault();

          var text = button.getAttribute("data-copy-text");
          if (!text) return;

          setButtonLabel(button, "Copying...", null);

          copyText(text)
            .then(function (copied) {
              if (!copied) {
                throw new Error("Copy command was rejected");
              }

              setButtonLabel(button, "Copied", "copied");
              resetCopiedState(button);
            })
            .catch(function () {
              setButtonLabel(button, "Copy failed", null);
              resetCopiedState(button);
            });
        });
      })();
    </script>
  </body>
</html>
