# Netlify configuration for the Quone marketing site.
#
# Connect this repo as a Netlify site and the configured build
# command below will produce dist/ on each push.

[build]
  publish = "dist/"
  command = "bash build.sh"

# Single-page routing: unknown URLs serve index.html so old links land on
# the homepage rather than 404ing.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long cache on the compiled Elm bundle. build.sh fingerprints the file
# as elm-<hash>.js, so this is safe across deploys.
[[headers]]
  for = "/elm-*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long cache on the self-hosted fonts. build.sh fingerprints each file
# as <name>-<hash>.<ext>, so this is safe across deploys and keeps the
# fonts hot in the cache for repeat visitors (which is what makes the
# `font-display: optional` strategy in index.html flash-free after the
# first visit).
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"
