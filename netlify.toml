# Netlify configuration for the Quone marketing site.
#
# Connect this directory as a Netlify site and the configured build
# command below will produce dist/ on each push.

[build]
  base = "website/"
  publish = "dist/"
  command = "bash build.sh"

# SPA routing: every URL serves index.html so Browser.application can
# resolve /install (and any future routes) client-side without 404s.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long cache on the compiled Elm bundle (it's content-addressed by name
# whenever you bump quone-lang.org's deploy, so this is safe).
[[headers]]
  for = "/elm.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
